name: runner_map
description: "Runner Map — GPS Running Tracker App (UAS Mobile Computing)"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # [Session 6] State management dengan Provider
  provider: ^6.1.2

  # [Session 10] GPS / Device features
  geolocator: ^14.0.0

  # Map display dengan OpenStreetMap (tidak perlu API Key)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # [Session 12] Local storage dengan Hive
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Format tanggal dan waktu
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
